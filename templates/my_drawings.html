<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>我的图纸工作台 - VIP专属</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="with-fixed-nav bg-light">

    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm fixed-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="{{ url_for('home') }}">🧩 拼豆图纸工坊</a>
            
            <div class="d-flex align-items-center">
                <a href="{{ url_for('home') }}" class="btn btn-outline-secondary btn-sm me-3">🏠 返回首页</a>
                <div class="me-3">
                    <span class="text-secondary small">当前用户：</span>
                    <span class="fw-bold">{{ current_user.username }}</span>
                    <span class="badge badge-vip rounded-pill">PRO 会员</span>
                </div>
                <a href="{{ url_for('logout') }}" class="btn btn-outline-danger btn-sm">退出登录</a>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold">📁 我的图纸工作台</h2>
            <a href="{{ url_for('draw_page') }}" class="btn btn-primary">➕ 新建空白图纸</a>
        </div>

        <div class="card shadow-sm border-0">
            <div class="card-body p-0">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                        <tr>
                            <th class="ps-4">图纸名称 (ID)</th>
                            <th>最后修改时间</th>
                            <th>文件大小</th>
                            <th class="text-end pe-4">操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% if drawings %}
                            {% for d in drawings %}
                            <tr id="row-{{ d.id }}">
                                <td class="ps-4 fw-bold text-primary">
                                    <span style="cursor: pointer;" onclick="window.location.href='/draw_page?id={{ d.id }}'">{{ d.id }}</span>
                                </td>
                                <td class="text-muted small">{{ d.mtime }}</td>
                                <td class="text-muted small">{{ d.size }} KB</td>
                                <td class="text-end pe-4">
                                    <a href="/draw_page?id={{ d.id }}" class="btn btn-sm btn-outline-primary">编辑</a>
                                    <a href="/api/download_source_db/{{ d.id }}" class="btn btn-sm btn-outline-success">下载 (.db)</a>
                                    <button class="btn btn-sm btn-outline-danger" onclick="deleteDrawing('{{ d.id }}')">删除</button>
                                </td>
                            </tr>
                            {% endfor %}
                        {% else %}
                            <tr>
                                <td colspan="4" class="text-center py-5 text-muted">
                                    <div style="font-size: 2rem; margin-bottom: 10px;">📭</div>
                                    暂无云端图纸，快去创建或导入一张吧！
                                </td>
                            </tr>
                        {% endif %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        async function deleteDrawing(drawingId) {
            if (!confirm(`警告：确定要永久删除图纸 [ ${drawingId} ] 吗？删除后将无法恢复！`)) {
                return;
            }

            try {
                const resp = await fetch('/api/delete_drawing', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ drawing_id: drawingId })
                });
                
                const data = await resp.json();
                
                if (resp.ok && data.status === 'success') {
                    // 从表格中移除该行
                    const row = document.getElementById(`row-${drawingId}`);
                    if (row) row.remove();
                    
                    // 如果列表空了，刷新页面以显示空状态提示
                    if (document.querySelectorAll('tbody tr').length === 0) {
                        location.reload();
                    }
                } else {
                    alert("删除失败: " + (data.msg || "未知错误"));
                }
            } catch (err) {
                console.error(err);
                alert("网络请求异常，无法删除");
            }
        }
    </script>
</body>
</html>
