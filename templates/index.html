<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>工具箱 - 导航首页</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; padding-top: 70px; min-height: 100vh; display: block; }
        .nav-card { transition: transform 0.3s; cursor: pointer; text-decoration: none; color: inherit; }
        .nav-card:hover { transform: translateY(-10px); }
        .icon-box { font-size: 3rem; margin-bottom: 1rem; }
        .badge-vip { background-color: #f5a623; color: white; margin-left: 5px; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm fixed-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">🧩 拼豆图纸工坊</a>
            
            <div class="d-flex align-items-center">
                <div class="me-3">
                    <span class="text-secondary small">当前用户：</span>
                    <span class="fw-bold">{{ current_user.username }}</span>
                    {% if current_user.user_level == 'vip' %}
                        <span class="badge badge-vip rounded-pill">PRO 会员</span>
                    {% else %}
                        <span class="badge bg-secondary rounded-pill">普通用户</span>
                    {% endif %}
                </div>
                <a href="{{ url_for('logout') }}" class="btn btn-outline-danger btn-sm">退出登录</a>
            </div>
        </div>
    </nav>

    <div class="container text-center mt-5">
        <h1 class="mb-5 fw-bold">图片与颜色处理系统</h1>

        <div class="card shadow-sm mb-5 mx-auto" style="max-width: 500px;">
            <div class="card-body bg-light rounded">
                <label class="form-label fw-bold d-block text-center">🎨 选择要使用的颜色库</label>
                <select id="db-select" class="form-select text-center" onchange="updateNavLinks()">
                    <option value="colors.db" {% if current == 'colors.db' %}selected{% endif %}>系统默认库 (只读)</option>
                    <option value="user_colors.db" {% if current == 'user_colors.db' %}selected{% endif %}>我的专属库 (可自由修改)</option>
                </select>
                <div class="form-text mt-2 text-muted small">
                    提示：您的专属库会自动初始化为系统基础颜色。
                </div>
            </div>
        </div>

        <div class="row justify-content-center g-4">
            <div class="col-md-4">
                <a href="{{ url_for('image_conversion') }}" id="nav-conversion" class="card h-100 p-4 nav-card shadow-sm border-0">
                    <div class="icon-box">🖼️</div>
                    <h4 class="fw-bold">图片颜色转换</h4>
                    <p class="text-muted small">使用选中的色库对图片进行智能降色与网格化</p>
                </a>
            </div>

            <div class="col-md-4">
                <a href="{{ url_for('view_colors') }}" id="nav-colors" class="card h-100 p-4 nav-card shadow-sm border-0">
                    <div class="icon-box">🎨</div>
                    <h4 class="fw-bold">颜色库管理</h4>
                    <p class="text-muted small">查看、编辑当前选中颜色库的 Lab 空间值</p>
                </a>
            </div>

            <div class="col-md-4">
                <a href="{{ url_for('draw_page') }}" class="card h-100 p-4 nav-card shadow-sm border-0">
                    <div class="icon-box">🖌️</div>
                    <h4 class="fw-bold">画布交互操作</h4>
                    <p class="text-muted small">进入画布页进行交互操作，实时修改像素</p>
                </a>
            </div>
        </div>
    </div>

    <script>
        // 当下拉框的颜色库改变时，自动更新下方卡片的跳转链接
        function updateNavLinks() {
            const selectedDb = document.getElementById('db-select').value;
            // 带着选中的参数跳转到颜色管理页
            document.getElementById('nav-colors').href = `/colors?db=${selectedDb}`;
        }

        // 页面加载完毕时初始化一次链接
        document.addEventListener('DOMContentLoaded', updateNavLinks);
    </script>
</body>
</html>
