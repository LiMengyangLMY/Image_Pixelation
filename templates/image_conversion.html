<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图片颜色编码处理工具</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="conversion-body">
    <div class="conversion-container">
        <h1>图片颜色编码处理工具</h1>
        <div style="text-align: center; margin-bottom: 20px;">
            <a href="{{ url_for('home') }}" style="text-decoration: none; color: #666;">返回首页</a>
        </div>
        {% if error %}
        <div class="error-message">{{ error }}</div>
        {% endif %}
        
        {% if success %}
        <div class="success-message">图片处理成功！</div>
        {% endif %}
        
        <div class="form-section">
            <form id="uploadForm" method="POST" enctype="multipart/form-data">
                <div class="form-group">
                    <label for="file">选择图片文件</label>
                    <input type="file" id="file" name="file" required accept="image/*">
                </div>
                
                <div class="form-group">
                    <label for="db_name">🎨 选择颜色库</label>
                    <select id="db_name" name="db_name" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px;">
                        <option value="colors.db">系统默认库 (只读)</option>
                        <option value="user_colors.db">我的专属库 (可增删改)</option>
                    </select>
                </div>

                <div class="form-group" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div>
                        <label for="target_width">输出宽度 (横向格子数)</label>
                        <input type="number" id="target_width" name="target_width" value="40" min="1">
                    </div>
                    <div>
                        <label for="pixel_size">单格尺寸</label>
                        <input type="number" id="pixel_size" name="pixel_size" value="20" min="1">
                    </div>
                </div>
                <div style="background-color: #ffff00; padding: 2px; border-radius: 4px; margin-bottom: 20px; display: inline-block;">
                <small style="color: #666;">* <strong>高度</strong>将按原图比例自动计算。</small>
                <small style="color: #666;">* <strong>单格尺寸</strong>越大图纸越清晰。</small>
                </div>

                <div class="form-group">
                    <label style="display: flex; align-items: center; gap: 10px; cursor: pointer; margin-bottom: 10px;">
                        <input type="checkbox" id="reduce_colors" name="reduce_colors" style="width: 18px; height: 18px;">
                        <span>开启精简颜色模式 </span>
                    </label>
                    
                    <label style="display: flex; align-items: center; gap: 10px; cursor: pointer;">
                        <input type="checkbox" id="reduce_colors_Pro" name="reduce_colors_Pro" style="width: 18px; height: 18px;">
                        <span>开启精简颜色Pro模式</span>
                    </label>
                </div>

                <div class="form-group" id="color_count_group" style="display:none; margin-left: 28px;">
                    <label for="color_count">目标颜色数量</label>
                    <input type="number" id="color_count" name="color_count" min="1" max="256" value="16">
                </div>

                <button type="submit">处理图片</button>
            </form>
        </div>
        
        <div id="resultSection" class="result-section {% if success %}show{% endif %}">
            <h2>处理结果</h2>
            {% if success %}
            <div class="image-container">
                <div class="image-box">
                    <h3>原始图片</h3>
                    <img src="{{ original_image }}" alt="原始图片">
                </div>
                <div class="image-box">
                <h3>处理后图片</h3>
                <img src="{{ processed_image }}" alt="处理后图片">
                {% set filename = processed_image.split('/')[-1] %}
                <a href="{{ url_for('download_file', filename=filename) }}" class="download-btn">下载处理后图片</a>
            </div>
            
            <div style="margin-top: 20px; display: flex; gap: 15px; justify-content: center;">
                {% if user_level == 'vip' %}
                    <button type="button" class="btn" style="background-color: #28a745; color: white; padding: 12px 24px; border: none; border-radius: 4px; cursor: pointer;" onclick="handleSaveData()">保存至云端 (VIP)</button>
                {% endif %}
                
                <button type="button" class="btn" style="background-color: #17a2b8; color: white; padding: 12px 24px; border: none; border-radius: 4px; cursor: pointer;" onclick="handleDownloadData()">下载源数据到本地</button>
                
                <button type="button" class="btn" style="background-color: #007bff; color: white; padding: 12px 24px; border: none; border-radius: 4px; cursor: pointer;" onclick="handleGoToDraw()">进入交互式绘图修改</button>
            </div>
            </div>

            {% endif %}
        </div>
       
       
    </div>

    <script>
        // 定义全局状态变量
        let isSaved = false;
        let currentDrawingId = "";

        document.addEventListener('DOMContentLoaded', function() {
            const form = document.getElementById('uploadForm');
            const fileInput = document.getElementById('file');
            const reduceCheckbox = document.getElementById('reduce_colors');
            const reduceProCheckbox = document.getElementById('reduce_colors_Pro');
            const colorCountGroup = document.getElementById('color_count_group');
            const resultSection = document.getElementById('resultSection');
            const submitBtn = form.querySelector('button');
            
            let lastSelectedFile = null;

            // --- 1. 互斥与显示逻辑 ---
            function updateColorGroup() {
                colorCountGroup.style.display = (reduceCheckbox.checked || reduceProCheckbox.checked) ? 'block' : 'none';
            }

            reduceCheckbox.addEventListener('change', function() {
                if (this.checked) reduceProCheckbox.checked = false;
                updateColorGroup();
            });

            reduceProCheckbox.addEventListener('change', function() {
                if (this.checked) reduceCheckbox.checked = false;
                updateColorGroup();
            });

            // --- 2. 文件状态记录 ---
            fileInput.addEventListener('change', function() {
                if (this.files && this.files[0]) {
                    lastSelectedFile = this.files[0];
                }
            });

            // --- 3. 核心 AJAX 提交逻辑 ---
            form.addEventListener('submit', function(e) {
                e.preventDefault();

                if (!fileInput.files[0] && !lastSelectedFile) {
                    alert("请先选择一张图片");
                    return;
                }

                const originalBtnText = submitBtn.innerText;
                submitBtn.disabled = true;
                submitBtn.innerText = '正在处理中...';

                const formData = new FormData(form);
                if (!fileInput.files[0] && lastSelectedFile) {
                    formData.set('file', lastSelectedFile);
                }

                fetch(window.location.href, {
                    method: 'POST',
                    body: formData
                })
                .then(response => response.text())
                .then(html => {
                    // 重置保存状态
                    isSaved = false; 
                    currentDrawingId = "";

                    const parser = new DOMParser();
                    const doc = parser.parseFromString(html, 'text/html');
                    const newResult = doc.getElementById('resultSection');
                    
                    if (newResult) {
                        resultSection.innerHTML = newResult.innerHTML;
                        resultSection.classList.add('show');
                        resultSection.scrollIntoView({ behavior: 'smooth' });
                    }

                    const errorMsg = doc.querySelector('.error-message');
                    if (errorMsg) alert(errorMsg.innerText);
                })
                .catch(err => {
                    console.error(err);
                    alert('处理失败，请稍后重试');
                })
                .finally(() => {
                    submitBtn.disabled = false;
                    submitBtn.innerText = originalBtnText;
                });
            });
        }); // DOMContentLoaded 闭合

        // --- 4. 全局保存与跳转函数 (放在外面，确保 onclick 能找到) ---
        // 1. VIP的云端保存逻辑 (原有逻辑优化)
        async function handleSaveData() {
            if (isSaved) {
                alert("该图纸已在云端保存，ID 为: " + currentDrawingId);
                return true;
            }

            const drawingId = prompt("请为该图纸源数据命名（仅限英文/数字）", "drawing_" + Date.now().toString().slice(-6));
            if (!drawingId) return false;

            try {
                const resp = await fetch('/api/save_modified', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ drawing_id: drawingId })
                });
                const result = await resp.json();
                
                if (result.status === 'success') {
                    isSaved = true;
                    currentDrawingId = drawingId;
                    alert("图纸已永久保存至云端！");
                    return true;
                } else {
                    alert("保存失败: " + result.msg);
                    return false;
                }
            } catch (e) {
                alert("网络请求出错");
                return false;
            }
        }

        // 2. 本地下载逻辑 (新)
        async function handleDownloadData() {
            let drawingId = currentDrawingId;
            // 如果还没落盘，先静默保存一次生成 .db 文件
            if (!isSaved) {
                drawingId = "local_" + Date.now().toString().slice(-6);
                try {
                    const resp = await fetch('/api/save_modified', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ drawing_id: drawingId })
                    });
                    const result = await resp.json();
                    if (result.status === 'success') {
                        isSaved = true;
                        currentDrawingId = drawingId;
                    } else {
                        alert("准备下载失败: " + result.msg);
                        return;
                    }
                } catch (e) {
                    alert("网络请求出错");
                    return;
                }
            }
            
            // 触发浏览器下载
            window.location.href = `/api/download_source_db/${currentDrawingId}`;
        }

        // 3. 直接跳转画图页逻辑
        function handleGoToDraw() {
            // 后端的 /draw_page 路由已具备自动将 temp_result_data 静默落盘的能力
            // 因此无需再弹窗打扰用户，直接跳转即可，普通用户的图纸会在5小时后被清理脚本自动擦除
            window.location.href = "{{ url_for('draw_page') }}";
        }
        

        async function handleGoToDraw() {
            /*
            if (!isSaved) {
                const confirmed = confirm("进入绘图前需要先保存图纸源数据。现在保存吗？");
                if (confirmed) {
                    const success = await handleSaveData();
                    if (!success) return; 
                } else {
                    return; 
                }
            }
            */
            window.location.href = "{{ url_for('draw_page') }}";
        }
    </script>

</body>

</html>
