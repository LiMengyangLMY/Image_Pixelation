<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>拼豆图纸 - 用户中心</title>
   
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>
<body class="login-body">

<div class="auth-card">
    <div class="tabs">
        <div class="tab active" id="tab-login" onclick="showSection('login')">登录</div>
        <div class="tab" id="tab-register" onclick="showSection('register')">注册</div>
        <div class="tab vip-tab" id="tab-vip" onclick="showSection('vip')">VIP激活</div>
    </div>

    <div class="form-container">
        <div id="login" class="form-section active">
            <div class="input-group">
                <input type="text" placeholder="用户名或邮箱" id="l_user">
            </div>
            <div class="input-group">
                <input type="password" placeholder="密码" id="l_pwd">
            </div>
            <button class="main-btn btn-primary" onclick="handleLogin()">立即登录</button>
            <div class="footer-links" onclick="showSection('forgot')">忘记密码？点此找回</div>
        </div>

        <div id="register" class="form-section">
            <div class="input-group">
                <input type="text" placeholder="设置用户名" id="r_user">
            </div>
            <div class="input-group">
                <input type="email" placeholder="输入邮箱地址" id="r_email">
            </div>
            <div class="input-group verify-box">
                <input type="text" placeholder="6位验证码" id="r_vcode">
                <button class="btn-verify" id="btn-r-code" onclick="sendEmailCode('register')">获取验证码</button>
            </div>
            <div class="input-group">
                <input type="password" placeholder="设置登录密码 (至少6位)" id="r_pwd">
            </div>
            <div class="input-group">
                <input type="password" placeholder="再次输入密码以确认" id="r_pwd_confirm">
            </div>
            <button class="main-btn btn-primary" onclick="handleRegister()">注 册</button>
        </div>

        <div id="vip" class="form-section">
            <p class="hint">激活码为您在第三方平台（如闲鱼/小红书/淘宝）购买获得的16位字符串。</p>
            <div class="input-group">
                <input type="text" placeholder="请输入需要激活的用户名" id="v_user">
            </div>
            <div class="input-group">
                <input type="text" placeholder="请输入16位激活卡密" id="v_code">
            </div>
            <button class="main-btn btn-vip" onclick="handleActivateVIP()">立即升级为 VIP</button>
        </div>

        <div id="forgot" class="form-section">
            <p class="hint">验证码将发送至您的注册邮箱</p>
            <div class="input-group">
                <input type="email" placeholder="注册邮箱地址" id="f_email">
            </div>
            <div class="input-group verify-box">
                <input type="text" placeholder="邮箱验证码" id="f_vcode">
                <button class="btn-verify" id="btn-f-code" onclick="sendEmailCode('forgot')">获取验证码</button>
            </div>
            <div class="input-group">
                <input type="password" placeholder="设置新密码" id="f_new_pwd">
            </div>
            <div class="input-group">
                <input type="password" placeholder="再次输入新密码确认" id="f_new_pwd_confirm">
            </div>
            <button class="main-btn btn-primary" onclick="handleResetPassword()">重置密码并登录</button>
            <div class="footer-links" onclick="showSection('login')">返回登录界面</div>
        </div>
    </div>
</div>

<script>
    // 页面切换逻辑
    function showSection(sectionId) {
        document.querySelectorAll('.form-section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        
        // 兼容 ID 映射
        const sectionMap = { 'login': 'login', 'register': 'register', 'vip': 'vip', 'forgot': 'forgot' };
        const tabMap = { 'login': 'tab-login', 'register': 'tab-register', 'vip': 'tab-vip' };
        
        const activeSection = document.getElementById(sectionMap[sectionId]);
        if(activeSection) activeSection.classList.add('active');
        
        const activeTab = document.getElementById(tabMap[sectionId]);
        if(activeTab) activeTab.classList.add('active');
    }

    // 通用提示函数
    function showToast(msg) {
        alert(msg); // 暂时用 alert，也可以后续换成更漂亮的弹窗
    }

    // ————————————————————————————————
    //        1. 发送验证码逻辑
    // ————————————————————————————————
    async function sendEmailCode(type) {
        // 确定是注册还是找回密码
        const isRegister = type === 'register';
        const emailInputId = isRegister ? 'r_email' : 'f_email';
        const btnId = isRegister ? 'btn-r-code' : 'btn-f-code';
        
        const email = document.getElementById(emailInputId).value.trim();
        const btn = document.getElementById(btnId);

        // 简单校验
        if (!email) {
            showToast("请先填写邮箱地址！");
            return;
        }

        // UI 倒计时
        let timeLeft = 60;
        btn.disabled = true;
        btn.innerText = "发送中...";

        try {
            // === 真正的后端调用 ===
            const res = await fetch('/api/send_email_code', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: email })
            });
            const data = await res.json();

            if (data.status === 'success') {
                showToast("✅ 验证码已发送，请查收邮件");
                // 启动倒计时
                const timer = setInterval(() => {
                    timeLeft--;
                    btn.innerText = `${timeLeft}s 后重发`;
                    if (timeLeft <= 0) {
                        clearInterval(timer);
                        btn.innerText = "获取验证码";
                        btn.disabled = false;
                    }
                }, 1000);
            } else {
                showToast("❌ 发送失败: " + data.msg);
                btn.disabled = false;
                btn.innerText = "获取验证码";
            }
        } catch (e) {
            console.error(e);
            showToast("❌ 网络请求错误，请检查服务器");
            btn.disabled = false;
            btn.innerText = "获取验证码";
        }
    }

    // ————————————————————————————————
    //           2. 注册逻辑
    // ————————————————————————————————
    async function handleRegister() {
        const username = document.getElementById('r_user').value.trim();
        const email = document.getElementById('r_email').value.trim();
        const vcode = document.getElementById('r_vcode').value.trim();
        const pwd = document.getElementById('r_pwd').value;
        const pwdConfirm = document.getElementById('r_pwd_confirm').value;

        if (!username || !email || !vcode || !pwd) {
            showToast("请填写完整信息");
            return;
        }
        if (pwd !== pwdConfirm) {
            showToast("两次输入的密码不一致！");
            return;
        }
        if (pwd.length < 6) {
            showToast("密码至少需要6位");
            return;
        }

        try {
            const res = await fetch('/api/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    username: username,
                    email: email,
                    password: pwd,
                    vcode: vcode
                })
            });
            const data = await res.json();

            if (data.status === 'success') {
                showToast("🎉 注册成功！请登录");
                showSection('login'); // 自动跳回登录页
            } else {
                showToast("注册失败: " + data.msg);
            }
        } catch (e) {
            showToast("网络错误");
        }
    }

    // ————————————————————————————————
    //           3. 登录逻辑
    // ————————————————————————————————
    async function handleLogin() {
        const account = document.getElementById('l_user').value.trim();
        const pwd = document.getElementById('l_pwd').value;

        if (!account || !pwd) {
            showToast("请输入账号和密码");
            return;
        }

        try {
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    account: account,
                    password: pwd
                })
            });
            const data = await res.json();

            if (data.status === 'success') {
                // showToast("登录成功！");
                window.location.href = '/'; // 跳转到首页
            } else {
                showToast("登录失败: " + data.msg);
            }
        } catch (e) {
            showToast("网络错误");
        }
    }

    // ————————————————————————————————
    //           4. VIP 激活逻辑
    // ————————————————————————————————
    async function handleActivateVIP() {
        const username = document.getElementById('v_user').value.trim();
        const code = document.getElementById('v_code').value.trim();

        if (!username || !code) {
            showToast("请输入用户名和卡密");
            return;
        }

        try {
            const res = await fetch('/api/activate_vip', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    username: username,
                    code: code
                })
            });
            const data = await res.json();
            
            if (data.status === 'success') {
                showToast("🎉 " + data.msg);
            } else {
                showToast("❌ " + data.msg);
            }
        } catch(e) {
            showToast("网络错误");
        }
    }
    
    // 找回密码
    async function handleResetPassword() {
        // 1. 获取输入值
        const email = document.getElementById('f_email').value.trim();
        const vcode = document.getElementById('f_vcode').value.trim();
        const newPwd = document.getElementById('f_new_pwd').value;
        const newPwdConfirm = document.getElementById('f_new_pwd_confirm').value;

        // 2. 前端校验
        if (!email || !vcode || !newPwd) {
            showToast("请填写完整信息（邮箱、验证码、新密码）");
            return;
        }
        if (newPwd !== newPwdConfirm) {
            showToast("两次输入的新密码不一致！");
            return;
        }
        if (newPwd.length < 6) {
            showToast("新密码至少需要6位");
            return;
        }

        // 3. 发送请求
        try {
            const res = await fetch('/api/reset_password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    email: email,
                    vcode: vcode,
                    password: newPwd
                })
            });
            const data = await res.json();
            
            if (data.status === 'success') {
                showToast("✅ " + data.msg);
                // 重置成功后，自动切回登录页
                setTimeout(() => {
                    showSection('login');
                    // 贴心地帮用户把邮箱填回去
                    document.getElementById('l_user').value = email;
                }, 1500);
            } else {
                showToast("❌ " + data.msg);
            }
        } catch(e) {
            console.error(e);
            showToast("网络错误，请稍后再试");
        }
    }
</script>

</body>
</html>
